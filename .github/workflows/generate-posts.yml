name: Generate Daily Posts

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC
    - cron: '0 16 * * *'  # 4pm UTC
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate post
        run: node scripts/generate.mjs
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and push new post
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: auto-generate daily post'
          file_pattern: 'content/posts/*.md'
